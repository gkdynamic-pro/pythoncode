<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance OCR Calculator</title>
    <!-- Use Tesseract.js v5 -->
    <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
            --text: #ffffff;
            --text-secondary: #aaaaaa;
            --border: #333333;
            --card-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f5f7fa;
                --surface: #ffffff;
                --primary: #6200ee;
                --secondary: #03dac6;
                --error: #b00020;
                --text: #333333;
                --text-secondary: #666666;
                --border: #e0e0e0;
                --card-shadow: 0 4px 12px rgba(0,0,0,0.1);
            }
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }
        
        .card {
            background-color: var(--surface);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
        }
        
        h1 {
            margin: 0 0 20px 0;
            font-size: 1.5rem;
            text-align: center;
            font-weight: 600;
        }
        
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            background-color: rgba(0,0,0,0.02);
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--primary);
            background-color: rgba(98, 0, 238, 0.05);
        }
        .drop-zone p {
            margin: 10px 0 0 0;
            color: var(--text-secondary);
        }
        .drop-zone svg {
            width: 48px;
            height: 48px;
            fill: var(--text-secondary);
            margin-bottom: 10px;
        }
        .drop-zone input { display: none; }
        
        .btn {
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: opacity 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover { opacity: 0.9; }
        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            border-color: var(--text);
        }
        
        .preview-container {
            display: none;
            margin-top: 20px;
            text-align: center;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: crosshair;
            display: block;
            margin: 0 auto;
        }
        .helper-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .progress-container {
            display: none;
            margin-top: 20px;
        }
        .progress-bar {
            height: 6px;
            background-color: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }
        .status-text {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(187, 134, 252, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-message {
            color: var(--error);
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background-color: rgba(207, 102, 121, 0.1);
            border-radius: 6px;
            display: none;
            font-weight: 500;
        }

        .results-section {
            display: none;
            margin-top: 20px;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .result-item {
            background-color: rgba(128,128,128,0.05);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .result-item.highlight {
            border-color: var(--secondary);
            background-color: rgba(3, 218, 198, 0.05);
        }
        .result-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }
        .highlight .result-value {
            color: var(--secondary);
        }

        .ocr-viewer {
            margin-top: 15px;
            padding: 12px;
            background-color: rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            max-height: 120px;
            overflow-y: auto;
            color: var(--text-secondary);
            display: none;
        }
        
        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Attendance Calculator</h1>
        
        <div class="drop-zone" id="drop-zone">
            <svg viewBox="0 0 24 24">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5-7l-3 3.72L9 13l-3 4h12l-4-5z"/>
            </svg>
            <p>Click to upload, paste (Ctrl+V), or drag image here</p>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div id="error-message" class="error-message"></div>

        <div class="preview-container" id="preview-container">
            <canvas id="preview-canvas"></canvas>
            <div class="helper-text">Auto-detected card region. Drag to adjust crop manually if needed.</div>
            
            <div class="actions">
                <button class="btn" onclick="processScreenshot()">Read Screenshot</button>
                <button class="btn btn-outline" onclick="clearApp()">Clear</button>
            </div>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="status-text">
                <div class="spinner"></div>
                <span id="status-text">Initializing...</span>
            </div>
        </div>

        <div class="results-section" id="results-section">
            <div class="results-grid">
                <div class="result-item">
                    <div class="result-label">Worked</div>
                    <div class="result-value" id="res-worked">--</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Remaining</div>
                    <div class="result-value" id="res-rem">--</div>
                </div>
                <div class="result-item">
                    <div class="result-label">Continue From</div>
                    <div class="result-value" id="res-out">--</div>
                </div>
                <div class="result-item highlight">
                    <div class="result-label">Finish Time</div>
                    <div class="result-value" id="res-finish">--</div>
                </div>
            </div>
            
            <div class="actions">
                <button class="btn" onclick="copyFinishTime()">Copy Finish Time</button>
                <button class="btn btn-outline" onclick="toggleOcrText()">View OCR Text</button>
            </div>
            
            <div class="ocr-viewer" id="ocr-viewer"></div>
        </div>
    </div>
</div>

<script>
    const TARGET_MINUTES = 600; // 10 hours

    let currentImage = null;
    let cropBox = null;
    let isDragging = false;
    let startX, startY;

    // UI Elements
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');
    
    const previewContainer = document.getElementById('preview-container');
    const progressContainer = document.getElementById('progress-container');
    const resultsSection = document.getElementById('results-section');
    const errorContainer = document.getElementById('error-message');
    const ocrViewer = document.getElementById('ocr-viewer');

    // Setup Event Listeners
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
            loadImage(e.dataTransfer.files[0]);
        }
    });
    fileInput.addEventListener('change', e => {
        if (e.target.files && e.target.files[0]) {
            loadImage(e.target.files[0]);
        }
    });
    document.addEventListener('paste', e => {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let item of items) {
            if (item.type.indexOf('image') === 0) {
                loadImage(item.getAsFile());
            }
        }
    });

    function showError(msg) {
        errorContainer.textContent = msg;
        errorContainer.style.display = 'block';
    }
    
    function hideError() {
        errorContainer.style.display = 'none';
    }

    function loadImage(file) {
        if (!file.type.startsWith('image/')) {
            showError("Please provide a valid image file.");
            return;
        }
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                currentImage = img;
                canvas.width = img.width;
                canvas.height = img.height;
                cropBox = null;
                
                autoDetectCard();
                drawCanvas();
                
                previewContainer.style.display = 'block';
                resultsSection.style.display = 'none';
                ocrViewer.style.display = 'none';
                hideError();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // Auto-detect a bright rectangular area in the image (the attendance card)
    function autoDetectCard() {
        const w = canvas.width;
        const h = canvas.height;
        ctx.drawImage(currentImage, 0, 0, w, h);
        const imgData = ctx.getImageData(0, 0, w, h);
        const data = imgData.data;
        
        let minX = w, minY = h, maxX = 0, maxY = 0;
        let found = false;
        
        for(let y = 0; y < h; y += 10) {
            for(let x = 0; x < w; x += 10) {
                let i = (y * w + x) * 4;
                let brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                if (brightness > 200) { // Check for bright pixels
                    if (x < minX) minX = x;
                    if (x > maxX) maxX = x;
                    if (y < minY) minY = y;
                    if (y > maxY) maxY = y;
                    found = true;
                }
            }
        }
        
        // Use auto-crop if a reasonable box is found
        if (found && (maxX - minX) > 100 && (maxY - minY) > 100 && (maxX - minX) < w * 0.95) {
            const padding = 15;
            cropBox = {
                x: Math.max(0, minX - padding),
                y: Math.max(0, minY - padding),
                w: Math.min(w - minX, maxX - minX + padding * 2),
                h: Math.min(h - minY, maxY - minY + padding * 2)
            };
        }
    }

    function drawCanvas() {
        if (!currentImage) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);
        
        // Draw shaded background outside crop box and dashed border
        if (cropBox) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, cropBox.y); // Top
            ctx.fillRect(0, cropBox.y + cropBox.h, canvas.width, canvas.height - (cropBox.y + cropBox.h)); // Bottom
            ctx.fillRect(0, cropBox.y, cropBox.x, cropBox.h); // Left
            ctx.fillRect(cropBox.x + cropBox.w, cropBox.y, canvas.width - (cropBox.x + cropBox.w), cropBox.h); // Right
            
            ctx.strokeStyle = '#03dac6';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(cropBox.x, cropBox.y, cropBox.w, cropBox.h);
            ctx.setLineDash([]);
        }
    }

    // Manual Cropping Handlers
    canvas.addEventListener('mousedown', e => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        startX = (e.clientX - rect.left) * scaleX;
        startY = (e.clientY - rect.top) * scaleY;
        cropBox = { x: startX, y: startY, w: 0, h: 0 };
        isDragging = true;
    });

    canvas.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const currX = (e.clientX - rect.left) * scaleX;
        const currY = (e.clientY - rect.top) * scaleY;
        
        cropBox.x = Math.min(startX, currX);
        cropBox.y = Math.min(startY, currY);
        cropBox.w = Math.abs(currX - startX);
        cropBox.h = Math.abs(currY - startY);
        drawCanvas();
    });

    canvas.addEventListener('mouseup', () => {
        isDragging = false;
        if (cropBox && (cropBox.w < 20 || cropBox.h < 20)) {
            cropBox = null; // discard tiny accidental drags
        }
        drawCanvas();
    });

    // Image Preprocessing Pipeline for OCR
    function preprocessForOCR(sourceRect) {
        const scale = 5; // upscale 5x
        const cw = sourceRect.w || canvas.width;
        const ch = sourceRect.h || canvas.height;
        const cx = sourceRect.x || 0;
        const cy = sourceRect.y || 0;
        
        const procCanvas = document.createElement('canvas');
        procCanvas.width = cw * scale;
        procCanvas.height = ch * scale;
        const pCtx = procCanvas.getContext('2d');
        
        pCtx.imageSmoothingEnabled = false;
        pCtx.drawImage(canvas, cx, cy, cw, ch, 0, 0, procCanvas.width, procCanvas.height);
        
        let imgData = pCtx.getImageData(0, 0, procCanvas.width, procCanvas.height);
        let data = imgData.data;
        
        // 1. Grayscale
        for (let i = 0; i < data.length; i += 4) {
            let r = data[i], g = data[i+1], b = data[i+2];
            let gray = 0.299*r + 0.587*g + 0.114*b;
            data[i] = data[i+1] = data[i+2] = gray;
        }
        
        // 2. Increase Contrast
        const contrast = 50; 
        const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
        for (let i = 0; i < data.length; i += 4) {
            let val = factor * (data[i] - 128) + 128;
            data[i] = data[i+1] = data[i+2] = val;
        }
        
        // 3. Sharpening Convolution (3x3 Kernel)
        const w = procCanvas.width;
        const h = procCanvas.height;
        const output = pCtx.createImageData(w, h);
        const outData = output.data;
        const kernel = [0, -1, 0, -1, 5, -1, 0, -1, 0];
        
        for (let y = 1; y < h - 1; y++) {
            for (let x = 1; x < w - 1; x++) {
                let idx = (y * w + x) * 4;
                let sum = 0;
                sum += data[((y-1)*w + (x-1))*4] * kernel[0];
                sum += data[((y-1)*w + x)*4]     * kernel[1];
                sum += data[((y-1)*w + (x+1))*4] * kernel[2];
                sum += data[(y*w + (x-1))*4]     * kernel[3];
                sum += data[(y*w + x)*4]         * kernel[4];
                sum += data[(y*w + (x+1))*4]     * kernel[5];
                sum += data[((y+1)*w + (x-1))*4] * kernel[6];
                sum += data[((y+1)*w + x)*4]     * kernel[7];
                sum += data[((y+1)*w + (x+1))*4] * kernel[8];
                
                outData[idx] = outData[idx+1] = outData[idx+2] = sum;
                outData[idx+3] = 255;
            }
        }
        
        // 4. Binary Threshold
        for (let i = 0; i < outData.length; i += 4) {
            if(outData[i+3] === 0) { 
                outData[i] = outData[i+1] = outData[i+2] = 255; 
                outData[i+3] = 255;
            }
            let val = outData[i] < 128 ? 0 : 255;
            outData[i] = outData[i+1] = outData[i+2] = val;
        }
        
        pCtx.putImageData(output, 0, 0);
        return procCanvas;
    }

    function updateProgress(percent, statusMsg) {
        document.getElementById('progress-fill').style.width = percent + '%';
        if (statusMsg) document.getElementById('status-text').textContent = statusMsg;
    }

    // Run OCR and analyze
    async function processScreenshot() {
        if (!currentImage) {
            showError("Please upload or paste an image first.");
            return;
        }
        hideError();
        resultsSection.style.display = 'none';
        ocrViewer.style.display = 'none';
        progressContainer.style.display = 'block';
        
        try {
            let rect = cropBox || { x: 0, y: 0, w: canvas.width, h: canvas.height };
            let procCanvas = preprocessForOCR(rect);
            
            updateProgress(10, 'Initializing OCR Engine...');
            
            const worker = await Tesseract.createWorker('eng', 1, {
                logger: m => {
                    if (m.status === 'recognizing text') {
                        updateProgress(10 + (m.progress * 80), 'Extracting text...');
                    } else {
                        updateProgress(10, m.status);
                    }
                }
            });
            
            await worker.setParameters({
                tessedit_pageseg_mode: '6',
                preserve_interword_spaces: '1'
            });
            
            const { data: { text } } = await worker.recognize(procCanvas);
            await worker.terminate();
            
            updateProgress(100, 'Processing complete');
            setTimeout(() => { progressContainer.style.display = 'none'; }, 500);
            
            ocrViewer.textContent = text;
            parseAndCalculate(text);
        } catch (e) {
            showError("OCR Error: " + e.message);
            progressContainer.style.display = 'none';
        }
    }

    // Normalize common OCR misreadings
    function normalizeOCR(text) {
        let lines = text.split('\n');
        return lines.map(line => {
            return line
                .replace(/O/g, '0')
                .replace(/o/g, '0')
                .replace(/[Il|]/g, '1')
                .replace(/S/g, '5')
                .replace(/[Zz]/g, '2')
                .replace(/[.;,]/g, ':')
                .replace(/\s+/g, ' ')
                .trim();
        }).join('\n');
    }

    // Parse text and calculate Finish Time
    function parseAndCalculate(rawText) {
        try {
            let text = normalizeOCR(rawText);
            
            // Extract Worked duration (e.g. 07h 37m)
            let workedMatch = text.match(/(?:^|\s|:)(\d{1,2})\s*[hH]\s*(\d{1,2})\s*[mM]/);
            if (!workedMatch) throw new Error("Worked duration not found (e.g. 07h 37m)");
            
            let workedH = parseInt(workedMatch[1], 10);
            let workedM = parseInt(workedMatch[2], 10);
            
            // Extract Times
            let times = [];
            let timeRegex = /(\d{1,2}):(\d{2})\s*([aApP][mM])/gi;
            let match;
            while ((match = timeRegex.exec(text)) !== null) {
                times.push(match);
            }
            
            if (times.length === 0) throw new Error("Time not found");
            if (times.length < 2) throw new Error("Could not find OUT time (found only 1 time). Please re-crop.");
            
            let outMatch = times[1];
            if (times.length > 2) outMatch = times[1]; // default to 2nd time
            
            let outH = parseInt(outMatch[1], 10);
            let outM = parseInt(outMatch[2], 10);
            let ampm = outMatch[3].toUpperCase();
            
            // Calculate Remaining Minutes
            let workedMins = workedH * 60 + workedM;
            let remMins = Math.max(0, TARGET_MINUTES - workedMins);
            
            let remH = Math.floor(remMins / 60);
            let remRemM = remMins % 60;
            
            // Calculate Finish Time
            let outTotalMins = outH * 60 + outM;
            if (ampm === 'PM' && outH < 12) outTotalMins += 12 * 60;
            else if (ampm === 'AM' && outH === 12) outTotalMins -= 12 * 60;
            
            let finishTotal = outTotalMins + remMins;
            let finishH = Math.floor(finishTotal / 60) % 24;
            let finishM = finishTotal % 60;
            
            let fAmpm = finishH >= 12 ? 'PM' : 'AM';
            let displayH = finishH % 12 || 12;
            
            // Display Results
            document.getElementById('res-worked').textContent = `${workedH.toString().padStart(2,'0')}h ${workedM.toString().padStart(2,'0')}m`;
            document.getElementById('res-rem').textContent = `${remH.toString().padStart(2,'0')}h ${remRemM.toString().padStart(2,'0')}m`;
            document.getElementById('res-out').textContent = outMatch[0].toUpperCase();
            document.getElementById('res-finish').textContent = `${displayH.toString().padStart(2,'0')}:${finishM.toString().padStart(2,'0')} ${fAmpm}`;
            
            resultsSection.style.display = 'block';
            
        } catch (e) {
            showError(e.message);
            ocrViewer.style.display = 'block'; // Show raw text to help debug
        }
    }

    function clearApp() {
        currentImage = null;
        cropBox = null;
        previewContainer.style.display = 'none';
        resultsSection.style.display = 'none';
        ocrViewer.style.display = 'none';
        hideError();
        fileInput.value = "";
    }

    function copyFinishTime() {
        const text = document.getElementById('res-finish').textContent;
        navigator.clipboard.writeText(text).then(() => {
            alert('Finish time copied: ' + text);
        });
    }

    function toggleOcrText() {
        ocrViewer.style.display = ocrViewer.style.display === 'none' ? 'block' : 'none';
    }
</script>

</body>
</html>
